<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stopwatch App</title>
    <link rel="icon" href="download.png" type="image/png" />

    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <p align="center">
  <img src="https://github-readme-stats.vercel.app/api?username=OmarWaleedSigma&show_icons=true&theme=dark&hide_border=true&count_private=true" height="160"/>

  <img src="https://streak-stats.demolab.com?user=OmarWaleedSigma&theme=dark&hide_border=true&ring=ffa500&fire=ffa500&currStreakLabel=ffa500" height="160"/>
</p>
    <div class="stopwatch">
      <h1 id="display">00:00:00:00</h1>

      <div class="buttons">
        <button id="start" onclick="start()">Start</button>
        <button id="stop" onclick="stop()">Stop</button>
        <button id="reset" onclick="reset()">Reset</button>
        <button id="lap" onclick="lap()">Lap</button>
        <button id="clearLaps" onclick="clearLaps()">Clear Laps</button>
      </div>

      <ul id="laps"></ul>
    </div>
  </body>
  <script src="./script.js"></script>
</html>
