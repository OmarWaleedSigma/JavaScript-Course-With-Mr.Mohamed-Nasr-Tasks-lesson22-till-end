<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Font Size Slider</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>Font Size Controller 🎚️</h1>

    <p id="text">
      Welcome to JavaScript Closure Practice 🚀
    </p>

    <!-- 🎚️ Slider -->
    <input 
      type="range" 
      id="slider" 
      min="10" 
      max="40" 
      value="16"
    >

    <!-- 🔄 Reset -->
    <button id="reset">Reset 🔄</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
